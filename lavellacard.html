<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임준혁 · LaVella Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --cream2: #F2EDE4;
    --gold: #C9A96E;
    --gold-light: #E8D4A8;
    --gold-dark: #A07840;
    --dark: #2C2522;
    --gray: #8A8278;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  /* 배경 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(201,169,110,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(201,169,110,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border: 1px solid var(--gold-light);
    box-shadow: 0 8px 60px rgba(160,120,64,0.12), 0 2px 12px rgba(160,120,64,0.08);
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 0.8s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* 상단 헤더 */
  .card-header {
    background: var(--dark);
    padding: 2.8rem 2.5rem 2.2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* 배경 장식 원 */
  .card-header .deco {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.15);
  }
  .deco-1 { width: 200px; height: 200px; top: -80px; left: -60px; }
  .deco-2 { width: 150px; height: 150px; bottom: -60px; right: -40px; }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 0.3rem;
    position: relative;
  }

  .brand-sub {
    font-size: 0.7rem;
    color: rgba(201,169,110,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 1.6rem;
    position: relative;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin: 0 auto 1.6rem;
    width: fit-content;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .divider::after { background: linear-gradient(90deg, var(--gold), transparent); }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .person-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: #fff;
    margin-bottom: 0.4rem;
    position: relative;
  }

  .person-title {
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 2px;
    position: relative;
  }

  /* 링크 섹션 */
  .card-body {
    padding: 1.8rem 2rem;
    background: #fff;
  }

  .contact-section {
    margin-bottom: 1.4rem;
  }

  .section-label {
    font-size: 0.62rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.7rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--cream2);
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 0.8rem;
    text-decoration: none;
    color: var(--dark);
    border-radius: 2px;
    transition: all 0.2s ease;
    margin-bottom: 0.3rem;
    border: 1px solid transparent;
  }

  .link-item:hover {
    background: var(--cream);
    border-color: var(--gold-light);
  }

  .link-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--gold-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--cream);
    transition: all 0.2s;
  }

  .link-item:hover .link-icon {
    background: var(--gold);
    border-color: var(--gold);
  }

  .link-icon svg {
    width: 16px; height: 16px;
    fill: var(--gold);
    transition: fill 0.2s;
  }
  .link-item:hover .link-icon svg { fill: #fff; }

  .link-info { flex: 1; min-width: 0; }
  .link-label {
    font-size: 0.65rem;
    color: var(--gray);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 0.15rem;
  }
  .link-value {
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-arrow {
    color: var(--gold-light);
    font-size: 0.8rem;
    flex-shrink: 0;
  }

  /* 저장 버튼 */
  .save-btn {
    display: block;
    width: 100%;
    padding: 1rem;
    background: var(--dark);
    color: var(--gold);
    text-align: center;
    text-decoration: none;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.8rem;
    letter-spacing: 3px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: 1rem;
  }

  .save-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,169,110,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .save-btn:hover::before { transform: translateX(100%); }
  .save-btn:hover { background: #1a1614; }

  /* 푸터 */
  .card-footer {
    padding: 1rem 2rem 1.4rem;
    text-align: center;
    border-top: 1px solid var(--cream2);
  }

  .footer-brand {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 2px;
  }

  .footer-copy {
    font-size: 0.6rem;
    color: var(--gray);
    margin-top: 0.3rem;
    letter-spacing: 1px;
  }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark);
    color: var(--gold);
    padding: 0.7rem 1.5rem;
    font-size: 0.8rem;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

<script>
function copyPhone() {

    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2000);
  });
}
</script>

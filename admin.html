<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaVella 관리자</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --gold: #C9A96E;
            --dark-gold: #A68A5C;
            --cream: #FAF8F3;
            --light-gold: #F5EFE0;
            --charcoal: #2C2C2C;
            --soft-gray: #E8E6E1;
            --white: #FFFFFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Noto Serif KR',serif; background:var(--cream); color:var(--charcoal); min-height:100vh; }

        /* LOGIN */
        #loginScreen {
            position:fixed; inset:0;
            background:linear-gradient(135deg, var(--charcoal) 0%, #1a1a1a 100%);
            display:flex; align-items:center; justify-content:center; z-index:9999;
        }
        .login-box {
            background:var(--white); padding:3rem; width:360px;
            text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.4);
        }
        .login-box h1 { font-family:'Playfair Display',serif; color:var(--gold); font-size:2rem; margin-bottom:0.5rem; }
        .login-box p { color:#888; font-size:0.9rem; margin-bottom:2rem; }
        .login-box input {
            width:100%; padding:1rem; border:1px solid var(--soft-gray);
            background:var(--cream); font-family:'Noto Serif KR',serif;
            font-size:1rem; margin-bottom:1rem; text-align:center; letter-spacing:3px;
        }
        .login-box input:focus { outline:none; border-color:var(--gold); }
        .login-btn {
            width:100%; padding:1rem; background:var(--gold); color:white;
            border:none; font-size:1rem; cursor:pointer; letter-spacing:2px;
            font-family:'Noto Serif KR',serif; transition:background 0.3s;
        }
        .login-btn:hover { background:var(--dark-gold); }
        .login-error { color:#e74c3c; font-size:0.9rem; margin-top:1rem; display:none; }

        /* MAIN */
        #mainScreen { display:none; }
        header {
            background:var(--charcoal); padding:1.2rem 2rem;
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; z-index:100;
        }
        header h1 { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.5rem; }
        .logout-btn {
            padding:0.5rem 1.2rem; background:transparent; border:1px solid #666;
            color:#ccc; cursor:pointer; font-size:0.85rem; transition:all 0.3s;
        }
        .logout-btn:hover { border-color:var(--gold); color:var(--gold); }

        .container { max-width:1200px; margin:0 auto; padding:2rem; }

        /* STATS */
        .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; margin-bottom:2rem; }
        .stat-card { background:var(--white); padding:1.5rem; border:1px solid var(--soft-gray); text-align:center; }
        .stat-card h3 { font-size:2.5rem; color:var(--gold); font-family:'Playfair Display',serif; }
        .stat-card p { color:#888; font-size:0.9rem; margin-top:0.5rem; }

        /* TABS */
        .tabs { display:flex; gap:0; margin-bottom:2rem; border-bottom:2px solid var(--soft-gray); }
        .tab-btn {
            padding:1rem 2rem; background:transparent; border:none;
            font-family:'Noto Serif KR',serif; font-size:1rem; cursor:pointer;
            color:#888; transition:all 0.3s; border-bottom:3px solid transparent; margin-bottom:-2px;
        }
        .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); font-weight:500; }
        .tab-btn:hover { color:var(--gold); }

        /* TABLE HEADER */
        .table-header {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:1rem;
        }
        .table-header h2 { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.5rem; }
        .table-actions { display:flex; gap:0.8rem; align-items:center; flex-wrap:wrap; }
        .refresh-btn {
            padding:0.5rem 1.2rem; background:var(--gold); color:white;
            border:none; cursor:pointer; font-size:0.9rem; transition:background 0.3s;
        }
        .refresh-btn:hover { background:var(--dark-gold); }
        .bulk-delete-btn {
            padding:0.5rem 1.2rem; background:transparent; color:#e74c3c;
            border:1px solid #e74c3c; cursor:pointer; font-size:0.9rem;
            transition:all 0.3s; display:none;
        }
        .bulk-delete-btn:hover { background:#e74c3c; color:white; }
        .bulk-delete-btn.visible { display:inline-block; }
        .select-all-label {
            display:flex; align-items:center; gap:0.5rem; cursor:pointer;
            font-size:0.9rem; color:var(--charcoal);
        }

        /* TABLE */
        table { width:100%; border-collapse:collapse; background:var(--white); }
        thead { background:var(--gold); color:white; }
        th { padding:1rem; text-align:left; font-size:0.9rem; font-weight:500; }
        th.check-col { width:50px; text-align:center; }
        td { padding:0.9rem 1rem; border-bottom:1px solid var(--soft-gray); font-size:0.9rem; vertical-align:top; }
        td.check-col { text-align:center; vertical-align:middle; }
        tr:hover td { background:var(--light-gold); }
        tr.selected td { background:#fff3cd; }
        .empty-row td { text-align:center; color:#888; padding:3rem; }

        /* CHECKBOX */
        input[type="checkbox"] {
            width:18px; height:18px; cursor:pointer; accent-color:var(--gold);
        }

        /* ACTION BUTTONS */
        .action-btns { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .btn-print {
            padding:0.4rem 0.8rem; background:var(--gold); color:white;
            border:none; cursor:pointer; font-size:0.8rem; transition:background 0.3s; white-space:nowrap;
        }
        .btn-print:hover { background:var(--dark-gold); }
        .btn-delete {
            padding:0.4rem 0.8rem; background:transparent; color:#e74c3c;
            border:1px solid #e74c3c; cursor:pointer; font-size:0.8rem; transition:all 0.3s;
        }
        .btn-delete:hover { background:#e74c3c; color:white; }

        /* LOADING */
        .loading { text-align:center; padding:3rem; color:#888; }
        .loading-spinner {
            display:inline-block; width:30px; height:30px;
            border:3px solid var(--soft-gray); border-top-color:var(--gold);
            border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:1rem;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* BLOCKED DATES */
        .dates-grid { display:grid; grid-template-columns:1fr 1fr; gap:2rem; }
        .dates-card { background:var(--white); padding:2rem; border:1px solid var(--soft-gray); }
        .dates-card h3 { font-family:'Playfair Display',serif; color:var(--gold); margin-bottom:1.5rem; }
        .date-input-row { display:flex; gap:1rem; margin-bottom:1.5rem; }
        .date-input-row input {
            flex:1; padding:0.8rem; border:1px solid var(--soft-gray);
            background:var(--cream); font-family:'Noto Serif KR',serif; font-size:1rem;
        }
        .date-input-row input:focus { outline:none; border-color:var(--gold); }
        .add-date-btn {
            padding:0.8rem 1.5rem; background:var(--gold); color:white;
            border:none; cursor:pointer; font-size:0.9rem; white-space:nowrap;
        }
        .add-date-btn:hover { background:var(--dark-gold); }
        .date-list { display:flex; flex-direction:column; gap:0.5rem; max-height:300px; overflow-y:auto; }
        .date-item {
            display:flex; justify-content:space-between; align-items:center;
            padding:0.7rem 1rem; background:var(--cream); border:1px solid var(--soft-gray);
        }
        .date-item span { font-size:0.95rem; }
        .date-item button { background:none; border:none; color:#e74c3c; cursor:pointer; font-size:1.2rem; padding:0 0.3rem; }
        .no-dates { color:#888; text-align:center; padding:2rem; }

        /* TOAST */
        .toast {
            position:fixed; bottom:2rem; right:2rem;
            background:var(--charcoal); color:white; padding:1rem 1.5rem;
            font-size:0.9rem; opacity:0; transition:opacity 0.3s; z-index:9999; pointer-events:none;
        }
        .toast.show { opacity:1; }

        @media (max-width:768px) {
            .stats-grid { grid-template-columns:1fr; }
            .dates-grid { grid-template-columns:1fr; }
            table { font-size:0.8rem; }
            th, td { padding:0.6rem; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-box">
        <h1>LaVella</h1>
        <p>관리자 페이지</p>
        <input type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="login-btn" onclick="doLogin()">로그인</button>
        <p class="login-error" id="loginError">비밀번호가 틀렸습니다</p>
    </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
    <header>
        <h1>LaVella 관리자</h1>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </header>

    <div class="container">
        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card"><h3 id="statBookings">-</h3><p>총 예약 신청</p></div>
            <div class="stat-card"><h3 id="statContracts">-</h3><p>총 계약서</p></div>
            <div class="stat-card"><h3 id="statBlocked">-</h3><p>예약 불가 날짜</p></div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('bookings')">📋 예약 신청</button>
            <button class="tab-btn" onclick="showTab('contracts')">📄 계약서</button>
            <button class="tab-btn" onclick="showTab('dates')">📅 캘린더 관리</button>
        </div>

        <!-- BOOKINGS TAB -->
        <div id="tab-bookings">
            <div class="table-header">
                <h2>예약 신청 목록</h2>
                <div class="table-actions">
                    <label class="select-all-label">
                        <input type="checkbox" id="selectAllBookings" onchange="toggleSelectAll('bookings')">
                        전체선택
                    </label>
                    <button class="bulk-delete-btn" id="bulkDeleteBookings" onclick="bulkDelete('bookings')">선택 삭제</button>
                    <button class="refresh-btn" onclick="loadBookings()">새로고침</button>
                </div>
            </div>
            <div id="bookingsLoading" class="loading"><div class="loading-spinner"></div><br>불러오는 중...</div>
            <div id="bookingsTable" style="display:none; overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th class="check-col"><input type="checkbox" id="selectAllBookings2" onchange="toggleSelectAll('bookings')"></th>
                            <th>예식 날짜</th>
                            <th>신랑/신부</th>
                            <th>연락처</th>
                            <th>예식장</th>
                            <th>요청사항</th>
                            <th>접수일</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTbody"></tbody>
                </table>
            </div>
        </div>

        <!-- CONTRACTS TAB -->
        <div id="tab-contracts" style="display:none;">
            <div class="table-header">
                <h2>계약서 목록</h2>
                <div class="table-actions">
                    <label class="select-all-label">
                        <input type="checkbox" id="selectAllContracts" onchange="toggleSelectAll('contracts')">
                        전체선택
                    </label>
                    <button class="bulk-delete-btn" id="bulkDeleteContracts" onclick="bulkDelete('contracts')">선택 삭제</button>
                    <button class="refresh-btn" onclick="loadContracts()">새로고침</button>
                </div>
            </div>
            <div id="contractsLoading" class="loading"><div class="loading-spinner"></div><br>불러오는 중...</div>
            <div id="contractsTable" style="display:none; overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th class="check-col"><input type="checkbox" id="selectAllContracts2" onchange="toggleSelectAll('contracts')"></th>
                            <th>예식 날짜</th>
                            <th>신랑/신부</th>
                            <th>패키지</th>
                            <th>총액</th>
                            <th>SNS동의</th>
                            <th>접수일</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="contractsTbody"></tbody>
                </table>
            </div>
        </div>

        <!-- DATES TAB -->
        <div id="tab-dates" style="display:none;">
            <div class="dates-grid">
                <div class="dates-card">
                    <h3>📅 예약 불가 날짜 추가</h3>
                    <div class="date-input-row">
                        <input type="date" id="newBlockDate">
                        <button class="add-date-btn" onclick="addBlockedDate()">추가</button>
                    </div>
                    <p style="font-size:0.85rem;color:#888;">추가하면 홈페이지 캘린더에 즉시 반영됩니다</p>
                </div>
                <div class="dates-card">
                    <h3>🚫 등록된 예약 불가 날짜</h3>
                    <div class="date-list" id="blockedDatesList">
                        <div class="no-dates">불러오는 중...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ============================================================
    // FIREBASE
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCAoBowyPJh8ax-vDy-vS5V2tsO4DIbg3w",
        authDomain: "labella-wedding.firebaseapp.com",
        projectId: "labella-wedding",
        storageBucket: "labella-wedding.firebasestorage.app",
        messagingSenderId: "490619262185",
        appId: "1:490619262185:web:278f7b9cb7b524984ecc78"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();

    var ADMIN_PASSWORD = 'lavella2026';

    // ============================================================
    // LOGIN
    // ============================================================
    function doLogin() {
        var pw = document.getElementById('pwInput').value;
        if (pw === ADMIN_PASSWORD) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            loadAll();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('pwInput').value = '';
        }
    }
    function doLogout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('pwInput').value = '';
    }

    // ============================================================
    // TABS
    // ============================================================
    function showTab(tab) {
        ['bookings','contracts','dates'].forEach(function(t) {
            document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
        });
        document.querySelectorAll('.tab-btn').forEach(function(btn, i) {
            btn.classList.toggle('active', ['bookings','contracts','dates'][i] === tab);
        });
    }

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    // ============================================================
    // LOAD ALL
    // ============================================================
    function loadAll() { loadBookings(); loadContracts(); loadBlockedDates(); }

    // ============================================================
    // 체크박스 선택 관리
    // ============================================================
    function toggleSelectAll(type) {
        var checkboxes = document.querySelectorAll('.row-check-' + type);
        var selectAll = document.getElementById('selectAllBookings') || document.getElementById('selectAllContracts');
        var isChecked = document.getElementById('selectAll' + (type === 'bookings' ? 'Bookings' : 'Contracts')).checked;
        checkboxes.forEach(function(cb) { cb.checked = isChecked; });
        // 헤더 체크박스도 동기화
        var h1 = document.getElementById('selectAll' + (type === 'bookings' ? 'Bookings' : 'Contracts'));
        var h2 = document.getElementById('selectAll' + (type === 'bookings' ? 'Bookings' : 'Contracts') + '2');
        if (h1) h1.checked = isChecked;
        if (h2) h2.checked = isChecked;
        updateBulkBtn(type);
    }

    function updateBulkBtn(type) {
        var checkboxes = document.querySelectorAll('.row-check-' + type + ':checked');
        var btn = document.getElementById('bulkDelete' + (type === 'bookings' ? 'Bookings' : 'Contracts'));
        if (checkboxes.length > 0) {
            btn.classList.add('visible');
            btn.textContent = '선택 삭제 (' + checkboxes.length + '건)';
        } else {
            btn.classList.remove('visible');
        }
    }

    // ============================================================
    // 다중 삭제
    // ============================================================
    function bulkDelete(type) {
        var checkboxes = document.querySelectorAll('.row-check-' + type + ':checked');
        if (checkboxes.length === 0) return;
        if (!confirm(checkboxes.length + '건을 삭제하시겠습니까? 복구할 수 없습니다.')) return;

        var ids = [];
        checkboxes.forEach(function(cb) { ids.push(cb.dataset.id); });

        var batch = db.batch();
        ids.forEach(function(id) {
            batch.delete(db.collection(type).doc(id));
        });
        batch.commit()
            .then(function() {
                showToast(ids.length + '건 삭제되었습니다');
                if (type === 'bookings') loadBookings();
                else loadContracts();
            })
            .catch(function(err) {
                console.error(err);
                showToast('삭제 실패');
            });
    }

    // ============================================================
    // 단일 삭제
    // ============================================================
    function deleteOne(collection, id) {
        if (!confirm('삭제하시겠습니까? 복구할 수 없습니다.')) return;
        db.collection(collection).doc(id).delete()
            .then(function() {
                showToast('삭제되었습니다');
                if (collection === 'bookings') loadBookings();
                else loadContracts();
            })
            .catch(function(err) { console.error(err); showToast('삭제 실패'); });
    }

    // ============================================================
    // BOOKINGS
    // ============================================================
    function loadBookings() {
        document.getElementById('bookingsLoading').style.display = 'block';
        document.getElementById('bookingsTable').style.display = 'none';

        db.collection('bookings').orderBy('createdAt', 'desc').get()
            .then(function(snapshot) {
                renderBookings(snapshot);
            })
            .catch(function() {
                db.collection('bookings').get().then(function(snapshot) { renderBookings(snapshot); });
            });
    }

    function renderBookings(snapshot) {
        var tbody = document.getElementById('bookingsTbody');
        tbody.innerHTML = '';
        var count = 0;

        if (snapshot.empty) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="8">예약 신청이 없습니다</td></tr>';
        } else {
            snapshot.forEach(function(doc) {
                count++;
                var d = doc.data();
                var row = document.createElement('tr');
                row.dataset.id = doc.id;
                row.innerHTML = ''
                    + '<td class="check-col"><input type="checkbox" class="row-check-bookings" data-id="' + doc.id + '" onchange="updateBulkBtn(\'bookings\')"></td>'
                    + '<td><strong>' + (d.date||'-') + '</strong><br><span style="color:#888;font-size:0.8rem;">' + (d.weddingTime||'') + '</span></td>'
                    + '<td>' + (d.groomName||'-') + ' ♥ ' + (d.brideName||'-') + '</td>'
                    + '<td>' + (d.phone||'-') + '<br><span style="color:#888;font-size:0.8rem;">' + (d.email||'') + '</span></td>'
                    + '<td>' + (d.venue||'-') + '</td>'
                    + '<td style="max-width:150px;font-size:0.85rem;">' + (d.message||'-') + '</td>'
                    + '<td style="font-size:0.8rem;">' + (d.createdAt ? new Date(d.createdAt).toLocaleDateString('ko-KR') : '-') + '</td>'
                    + '<td><div class="action-btns"><button class="btn-delete" onclick="deleteOne(\'bookings\',\'' + doc.id + '\')">삭제</button></div></td>';
                tbody.appendChild(row);
            });
        }

        document.getElementById('statBookings').textContent = count;
        document.getElementById('bookingsLoading').style.display = 'none';
        document.getElementById('bookingsTable').style.display = 'block';
        // 선택 초기화
        document.getElementById('selectAllBookings').checked = false;
        document.getElementById('selectAllBookings2').checked = false;
        document.getElementById('bulkDeleteBookings').classList.remove('visible');
    }

    // ============================================================
    // CONTRACTS
    // ============================================================
    function loadContracts() {
        document.getElementById('contractsLoading').style.display = 'block';
        document.getElementById('contractsTable').style.display = 'none';

        db.collection('contracts').orderBy('createdAt', 'desc').get()
            .then(function(snapshot) { renderContracts(snapshot); })
            .catch(function() {
                db.collection('contracts').get().then(function(snapshot) { renderContracts(snapshot); });
            });
    }

    function renderContracts(snapshot) {
        var tbody = document.getElementById('contractsTbody');
        tbody.innerHTML = '';
        var count = 0;

        if (snapshot.empty) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="8">계약서가 없습니다</td></tr>';
        } else {
            snapshot.forEach(function(doc) {
                count++;
                var d = doc.data();
                var pkgShort = (d.package||'-')
                    .replace('Essentiel (에센셜) - 600,000원','에센셜')
                    .replace('Classique (클래식) - 850,000원','클래식')
                    .replace('Prestige (프레스티지) - 1,150,000원','프레스티지');
                var row = document.createElement('tr');
                row.dataset.id = doc.id;
                row.innerHTML = ''
                    + '<td class="check-col"><input type="checkbox" class="row-check-contracts" data-id="' + doc.id + '" onchange="updateBulkBtn(\'contracts\')"></td>'
                    + '<td><strong>' + (d.date||'-') + '</strong><br><span style="color:#888;font-size:0.8rem;">' + (d.time||'') + '</span></td>'
                    + '<td>' + (d.groomName||'-') + ' ♥ ' + (d.brideName||'-') + '<br><span style="color:#888;font-size:0.8rem;">' + (d.phone||'') + '</span></td>'
                    + '<td style="font-size:0.85rem;">' + pkgShort + '</td>'
                    + '<td><strong style="color:var(--gold);">' + (d.totalAmount||'-') + '</strong><br><span style="color:#888;font-size:0.8rem;">계약금 ' + (d.deposit||'-') + '</span></td>'
                    + '<td style="text-align:center;">' + (d.agreeSNS ? '✅' : '❌') + '</td>'
                    + '<td style="font-size:0.8rem;">' + (d.createdAt ? new Date(d.createdAt).toLocaleDateString('ko-KR') : '-') + '</td>'
                    + '<td><div class="action-btns">'
                    + '<button class="btn-print" onclick="printContract(\'' + doc.id + '\')">인쇄/PDF</button>'
                    + '<button class="btn-delete" onclick="deleteOne(\'contracts\',\'' + doc.id + '\')">삭제</button>'
                    + '</div></td>';
                tbody.appendChild(row);
            });
        }

        document.getElementById('statContracts').textContent = count;
        document.getElementById('contractsLoading').style.display = 'none';
        document.getElementById('contractsTable').style.display = 'block';
        document.getElementById('selectAllContracts').checked = false;
        document.getElementById('selectAllContracts2').checked = false;
        document.getElementById('bulkDeleteContracts').classList.remove('visible');
    }

    // ============================================================
    // 계약서 인쇄/PDF 저장 (한글 깨짐 없음)
    // ============================================================
    function buildContractHTML(d) {
        var tL = 'padding:10px 14px;font-weight:bold;width:38%;background:#FAF8F3;border-bottom:1px solid #E8E6E1;';
        var tR = 'padding:10px 14px;border-bottom:1px solid #E8E6E1;';
        var tH = 'background:#C9A96E;padding:10px 14px;text-align:left;color:white;';
        var tS = 'width:100%;border-collapse:collapse;margin-bottom:1.5rem;font-size:0.95rem;';
        var createdStr = d.createdAt ? new Date(d.createdAt).toLocaleString('ko-KR') : '-';

        var h = '<div style="font-family:Noto Serif KR,serif;max-width:700px;margin:0 auto;color:#2C2C2C;">';
        h += '<div style="text-align:center;padding:2rem 0 1.5rem;border-bottom:2px solid #C9A96E;margin-bottom:2rem;">';
        h += '<h1 style="font-family:Playfair Display,serif;color:#C9A96E;font-size:2rem;margin:0 0 0.3rem;letter-spacing:3px;">LaVella Wedding</h1>';
        h += '<p style="font-size:1.1rem;margin:0;">웨딩 촬영 계약서</p>';
        h += '<p style="font-size:0.85rem;color:#888;margin-top:0.5rem;">작성일: ' + createdStr + '</p></div>';

        h += '<table style="' + tS + '"><tr><th colspan="2" style="' + tH + '">고객 정보</th></tr>';
        h += '<tr><td style="' + tL + '">신랑</td><td style="' + tR + '">' + (d.groomName||'-') + '</td></tr>';
        h += '<tr><td style="' + tL + '">신부</td><td style="' + tR + '">' + (d.brideName||'-') + '</td></tr>';
        h += '<tr><td style="' + tL + '">연락처</td><td style="' + tR + '">' + (d.phone||'-') + '</td></tr>';
        h += '<tr><td style="' + tL + '">이메일</td><td style="' + tR + '">' + (d.email||'-') + '</td></tr>';
        if (d.address && d.address !== '-') h += '<tr><td style="' + tL + '">배송 주소</td><td style="' + tR + '">' + d.address + '</td></tr>';
        h += '</table>';

        h += '<table style="' + tS + '"><tr><th colspan="2" style="' + tH + '">예식 정보</th></tr>';
        h += '<tr><td style="' + tL + '">예식 날짜</td><td style="' + tR + '">' + (d.date||'-') + '</td></tr>';
        h += '<tr><td style="' + tL + '">예식 시간</td><td style="' + tR + '">' + (d.time||'-') + '</td></tr>';
        h += '<tr><td style="' + tL + '">예식장</td><td style="' + tR + '">' + (d.venueName||'-') + '</td></tr>';
        h += '<tr><td style="' + tL + '">예식장 주소</td><td style="' + tR + '">' + (d.venueAddress||'-') + '</td></tr>';
        h += '</table>';

        h += '<table style="' + tS + '"><tr><th colspan="2" style="' + tH + '">촬영 패키지</th></tr>';
        h += '<tr><td style="' + tL + '">선택 패키지</td><td style="' + tR + '">' + (d.package||'-') + '</td></tr>';
        h += '<tr style="background:#F5EFE0;"><td style="padding:12px 14px;font-weight:bold;color:#C9A96E;">총 계약금액</td><td style="padding:12px 14px;font-weight:bold;color:#C9A96E;">' + (d.totalAmount||'-') + '</td></tr>';
        h += '<tr><td style="' + tL + '">계약금</td><td style="' + tR + '">' + (d.deposit||'200,000원') + '</td></tr>';
        h += '<tr><td style="' + tL + '">잔금</td><td style="' + tR + '">' + (d.remaining||'-') + '</td></tr>';
        h += '</table>';

        h += '<table style="' + tS + '"><tr><th colspan="2" style="' + tH + '">동의 사항</th></tr>';
        h += '<tr><td style="' + tL + '">SNS 홍보 동의</td><td style="' + tR + '">' + (d.agreeSNS ? '동의' : '미동의') + '</td></tr>';
        h += '</table>';

        h += '<div style="padding:1.2rem;background:#F5EFE0;border-left:3px solid #C9A96E;font-size:0.88rem;color:#666;line-height:1.8;">';
        h += '카카오뱅크 3333-34-8554081 (예금주: 임준혁)<br>계약금 200,000원 입금 후 예약 확정</div></div>';
        return h;
    }

    function printContract(docId) {
        db.collection('contracts').doc(docId).get()
            .then(function(doc) {
                if (!doc.exists) { showToast('데이터를 찾을 수 없습니다'); return; }
                var d = doc.data();
                // 팝업 없이 현재 페이지에 인쇄 오버레이 방식
                var overlay = document.getElementById('printOverlay');
                document.getElementById('printContent').innerHTML = buildContractHTML(d);
                overlay.style.display = 'flex';
            })
            .catch(function(err) { console.error(err); showToast('불러오기 실패'); });
    }

    function closePrintOverlay() {
        document.getElementById('printOverlay').style.display = 'none';
    }

    function doPrint() {
        window.print();
    }

    // ============================================================
    // BLOCKED DATES
    // ============================================================
    var blockedDatesData = [];

    function loadBlockedDates() {
        db.collection('blockedDates').get()
            .then(function(snapshot) {
                blockedDatesData = [];
                snapshot.forEach(function(doc) {
                    if (doc.data().date) blockedDatesData.push({ id: doc.id, date: doc.data().date });
                });
                blockedDatesData.sort(function(a,b){ return a.date.localeCompare(b.date); });
                renderBlockedDates();
                document.getElementById('statBlocked').textContent = blockedDatesData.length;
            })
            .catch(function(err) { console.error(err); });
    }

    function renderBlockedDates() {
        var list = document.getElementById('blockedDatesList');
        if (blockedDatesData.length === 0) {
            list.innerHTML = '<div class="no-dates">등록된 날짜가 없습니다</div>';
            return;
        }
        list.innerHTML = blockedDatesData.map(function(item) {
            return '<div class="date-item"><span>📅 ' + item.date + '</span>'
                + '<button onclick="removeBlockedDate(\'' + item.id + '\')" title="삭제">✕</button></div>';
        }).join('');
    }

    function addBlockedDate() {
        var input = document.getElementById('newBlockDate');
        var date = input.value;
        if (!date) { showToast('날짜를 선택해주세요'); return; }
        if (blockedDatesData.some(function(d){ return d.date === date; })) { showToast('이미 등록된 날짜입니다'); return; }

        db.collection('blockedDates').add({ date: date })
            .then(function() {
                input.value = '';
                loadBlockedDates();
                showToast(date + ' 추가되었습니다');
            })
            .catch(function(err) { console.error(err); showToast('추가 실패'); });
    }

    function removeBlockedDate(id) {
        db.collection('blockedDates').doc(id).delete()
            .then(function() { loadBlockedDates(); showToast('삭제되었습니다'); })
            .catch(function(err) { console.error(err); showToast('삭제 실패'); });
    }
</script>

    <!-- 인쇄 오버레이 -->
    <div id="printOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;align-items:center;justify-content:center;">
        <div style="background:white;width:90%;max-width:780px;max-height:90vh;overflow-y:auto;border-radius:4px;">
            <div style="background:#C9A96E;padding:1.2rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1;" class="no-print-overlay">
                <span style="color:white;font-family:'Playfair Display',serif;font-size:1.2rem;">계약서 미리보기</span>
                <div style="display:flex;gap:1rem;">
                    <button onclick="doPrint()" style="padding:0.6rem 1.5rem;background:white;color:#C9A96E;border:none;cursor:pointer;font-family:'Noto Serif KR',serif;font-size:0.95rem;font-weight:bold;">PDF로 저장 / 인쇄</button>
                    <button onclick="closePrintOverlay()" style="padding:0.6rem 1.2rem;background:transparent;color:white;border:1px solid white;cursor:pointer;font-size:0.95rem;">닫기</button>
                </div>
            </div>
            <div id="printContent" style="padding:2rem;"></div>
        </div>
    </div>

    <!-- 인쇄 전용 CSS -->
    <style>
        @media print {
            body > *:not(#printOverlay) { display: none !important; }
            #printOverlay {
                display: block !important;
                position: static !important;
                background: white !important;
            }
            .no-print-overlay { display: none !important; }
            #printContent { padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
